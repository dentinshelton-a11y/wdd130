<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Animas Rapids</title>

    <meta name="description"
      content="Contact information for Animas Rapids company with a form to fill out if there are questions or requests">
    <meta name="author" content="Dentin Shelton">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-rapids-trees.jpg" alt="Animas Rapids Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="info">
            <article>
                <h1>Animas Rapids</h1>
                <p>101 Animas BLVD</p>
                <p>Farmington NM, 87401</p>
                <p>+1 505 555 5555</p>
                <p>info@animasrapids.com</p>
            </article>

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d799.4499867711868!2d-108.19170242470126!3d36.7273655535262!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775250174241!5m2!1sen!2sus"
              loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

            <form class="form">
                <div class="form box">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="form box">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form box radios">
                    <label for="radio">Message Purpose</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="general" name="purpose" value="general">
                            <label for="general">General Inquiry</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            <label for="reservation">Reservation Question</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            <label for="suggestion">Website Suggestion</label>
                        </div>
                    </div>
                </div>
                <div class="form messagebox">
                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>
                </div>
                <div class="checkbox box">
                    <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                    <label for="newsletter">Please subscribe me to the monthly newsletter.</label>
                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section>
            <h2>WE Are Here To Serve You</h2>
            <div class="employees">
                <figure>
                    <img src="images/employee1.jpg" alt="Rafting Instructor">
                    <figcaption>Rafting Instructor</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Activities Director">
                    <figcaption>Activities Director</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Safety Instuctor">
                    <figcaption>Safety Instuctor</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <nav class="socialmedia">
            <p>&copy; 2026 Animas Rapids. Dentin Shelton</p>
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon" width="100">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn Icon" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon" width="100">
            </a>
        </nav>
    </footer>
</body>

</html>
